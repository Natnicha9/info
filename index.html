<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คู่มือการจัดการโกโก้ครบวงจร</title>
<style>
    :root {
        --primary-color: #6d4c41;
        --secondary-color: #4e342e;
        --bg-color: #f8f5f2;
    }
    body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
    
    .container { max-width: 1000px; margin: auto; text-align: center; }
    h1 { color: var(--secondary-color); margin-bottom: 40px; font-size: 2.5em; }

    /* ปรับปรุงระบบ Grid ของปุ่มให้เหมือนหน้าสายพันธุ์ */
    .menu-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
        gap: 25px; 
        padding: 20px;
    }

    /* สไตล์การ์ดปุ่มใหม่ */
    .menu-card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        border: 1px solid #e0e0e0;
    }

    .menu-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 12px 25px rgba(109, 76, 65, 0.2);
        border-color: var(--primary-color);
    }

    .card-icon {
        height: 150px;
        background: #efebe9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
    }

    .card-title {
        padding: 20px;
        font-size: 1.2em;
        font-weight: bold;
        color: var(--secondary-color);
        background: white;
    }

    /* เอฟเฟกต์สีเมื่อ Hover ที่ตัวหนังสือ */
    .menu-card:hover .card-title {
        background: var(--primary-color);
        color: white;
    }
</style>

<div class="container">
    <h1>🍫 ระบบข้อมูลการจัดการโกโก้ครบวงจร</h1>
    
    <div class="menu-grid">
        <a href="details.html" class="menu-card">
            <div class="card-icon">🧺</div>
            <div class="card-title">การเก็บเกี่ยวและการหมัก</div>
        </a>

        <a href="planting.html" class="menu-card">
            <div class="card-icon">🌱</div>
            <div class="card-title">การปลูกและการดูแล</div>
        </a>

        <a href="pests.html" class="menu-card">
            <div class="card-icon">🛡️</div>
            <div class="card-title">โรคและแมลงศัตรูพืช</div>
        </a>

        <a href="varieties.html" class="menu-card">
            <div class="card-icon">🌳</div>
            <div class="card-title">สายพันธุ์ที่นิยมในไทย</div>
        </a>
    </div>
</div>

<script>
    function showSection(id) {
        document.getElementById('main-menu').style.display = 'none';
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
    function showHome() {
        document.getElementById('main-menu').style.display = 'block';
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
    }
</script>

</body>
</html>
